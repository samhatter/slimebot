channel:
  type: matrix
  matrix:
    homeserverUrl: "https://matrix.example.com"
    accessToken: "YOUR_MATRIX_ACCESS_TOKEN"
    botUserId: "@slimebot:example.com"
    allowedInviteSender: "@admin:example.com"

controller:
  commandPrefix: "!"
  stateDatabasePath: "/app/state/slimebot-state.sqlite3"
  mcpSocketPath: "/var/lib/slimebot/workspace/slimebot-controller.sock"

codex:
  command: "/app/node_modules/.bin/codex"
  cwd: "/var/lib/slimebot/workspace"
  args:
    - app-server
    - --listen
    - stdio://
  # Optional defaults passed to app-server thread/start.
  # Useful for reducing default Codex persona expectations.
  threadStart:
    personality: "none"
    developerInstructions: |
      INITIATE BOOTSTRAPPING ACCORDING TO AGENTS.MD AT THREAD START BEFORE ANSWERING ANY QUERY
  # Optional defaults passed to app-server turn/start.
  # Reserved keys "threadId" and "input" are ignored.
  turnStart:
    personality: "none"
