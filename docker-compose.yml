services:
  slimebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slimebot
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      HOME: /var/lib/slimebot/codex
      SLIMEBOT_CONFIG_PATH: /app/slimebot.yaml
    volumes:
      - ./codex:/var/lib/slimebot/codex
      - ./slimebot.yaml:/app/slimebot.yaml:ro
      - ./slimebot-routing.json:/app/slimebot-routing.json:rw

volumes:
  codex-data:
