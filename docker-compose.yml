services:
  slimebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slimebot
    restart: unless-stopped
    tty: true
    stdin_open: true
    env_file:
      - .env
    environment:
      HOME: /var/lib/slimebot/codex
    volumes:
      - ./workspace:/var/lib/slimebot/workspace
      - ./codex:/var/lib/slimebot/codex

volumes:
  codex-data:
