services:
  slimebot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slimebot
    restart: unless-stopped
    tty: true
    stdin_open: true
    environment:
      HOME: /var/lib/slimebot/codex
      SLIMEBOT_CONFIG_PATH: /app/slimebot.yaml
      NPM_CONFIG_CACHE: /var/lib/slimebot/workspace/.npm-cache
    env_file:
      - secrets.env
    volumes:
      - ./codex:/var/lib/slimebot/codex
      - ./workspace:/var/lib/slimebot/workspace
      - ./codex-config.toml:/var/lib/slimebot/codex/.codex/config.toml:ro
      - ./logs:/var/lib/slimebot/logs
      - ./slimebot.yaml:/app/slimebot.yaml:ro
      - ./state:/app/state
    command: >
      sh -lc "mkdir -p /var/lib/slimebot/logs &&
      node dist/index.js 2>&1 | tee -a /var/lib/slimebot/logs/slimebot.log"

volumes:
  codex-data:
